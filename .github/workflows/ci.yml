name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install core test dependencies
        run: python -m pip install -e ".[test]"
      - name: Run tests
        run: python -m pytest
      - name: Verify frozen public results
        run: python scripts/verify_results.py
      - name: Audit release candidates
        run: python scripts/check_release.py --public
